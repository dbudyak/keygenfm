AutoName: Keygen FM

Summary: 24/7 chiptune and demoscene radio

Description: |-
  Keygen FM is a 24/7 internet radio station streaming chiptune, cracktro, and
  demoscene music. This app provides a simple, retro-styled player with a
  Windows 95 aesthetic.

  Features:
  * Stream high-quality MP3 audio
  * Now playing information with album art
  * Background playback with media controls
  * Volume control
  * Live listener count
  * Windows 95-inspired UI

  The app streams from a self-hosted AzuraCast radio station and displays
  real-time metadata including track information, album artwork, and playback
  progress.

